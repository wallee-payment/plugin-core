<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PluginCore Checkout Simulation</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            margin-bottom: 2rem;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background-color: #0056b3;
        }

        #payment-form {
            width: 100%;
            min-height: 200px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>PluginCore Checkout Simulation</h1>
        <div id="payment-form"></div>
<div id="payment-form_errors" class="payment-error-container"></div>
<button id="payment-form_submit" class="payment-submit-button">Pay Now</button>
<script src="https://app-wallee.com/assets/payment/iframe-checkout-handler.js?spaceId=32088&transactionId=512987254&securityToken=1776437047570-U_MUOTG_aZOKr65Wl0RTS_I_MkjHp82quIC3p3SCi4U-1464855412534"></script>
<script>
    window.__walleeHandlers = window.__walleeHandlers || {};
    var handler = window.IframeCheckoutHandler(115187);
    window.__walleeHandlers['115187'] = handler;
    handler.setValidationCallback(function(validationResult) {
        var errorContainer = document.getElementById("payment-form_errors");
        if (errorContainer) {
            errorContainer.innerText = "";
            if (validationResult.success) {
                handler.submit();
            } else {
                errorContainer.innerText = validationResult.errors ? validationResult.errors.join("\n") : "Validation failed.";
            }
        }
    });
    handler.create("payment-form");
    var submitBtn = document.getElementById("payment-form_submit");
    if (submitBtn) {
        submitBtn.addEventListener("click", function() { handler.validate(); });
    }
</script>
    </div>
</body>

</html>
